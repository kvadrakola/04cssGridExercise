<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main class="grid-container">
        <div class="block titleBlock">
            <h1>Future City</h1>
        </div>
        <div class="block logoBlock">   
            <img src="img/01TitleFutureCity.png" alt="Logo">
        </div>
        <div class="block img2Block">
            <img src="img/02VerticalBanner1.png" alt="A grand, vertical-oriented scene of a futuristic metropolis at twilight. Soaring crystalline skyscrapers connected by luminous magnetic-levitation train tracks. Flying vehicles with light trails. The overall color palette is electric blue, deep magenta, and polished steel. Highly detailed and epic in scale.">  
        </div>
        <div class="block img3Block">
            <img src="img/03CollageHorizontal.png" alt="A wide, vibrant collage split into two or three contiguous panels. Panels show: 1) A clean, automated vertical farm inside a glass dome. 2) A close-up of a human hand interacting with a holographic interface. 3) People in minimalist, functional futuristic clothing walking in a public plaza. The collage is cohesive, unified by a clean white border.">
        </div>
        <div class="block img4Block">
            <img src="img/04FigureSyntheticCitizen.png" alt="A vertical-oriented scene of a futuristic city during sunset. Sleek skyscrapers with reflective glass surfaces, connected by sky bridges. A river running through the city with illuminated boats. The color palette is warm oranges, purples, and golds. Highly detailed and atmospheric in style.">
        </div>
        <div class="block img5Block">
            <img src="img/05FigureMaintenanceBot.png" alt="A 3D render of a collectible, stylized miniature figure of an 'Autonomous Maintenance Bot'. Compact, multi-limbed design with orange and white paneling. Positioned on a small display plinth. Clean, detailed studio presentation against a neutral background. The packaging art is visible.">
        </div>
        <div class="block img6Block">
            <img src="img/06FigureCourierDrone.png" alt="A 3D render of a collectible, stylized miniature figure of a 'Courier Drone'. Sleek, multi-rotor design with functional compartment, in a cyan and gold color scheme. Displayed on a clear stand, with clear packaging material visible, against a neutral, plain background.">
        </div> 
        <div class="block img7Block">
            <img src="img/07FigureCyberneticAdvisor.png" alt="A 3D render of a collectible, stylized action figure of a 'Cybernetic Advisor'. Elegantly robed figure with subtle, high-tech metallic components. Posed formally, on a display stand with integrated lighting, against a clean, neutral background."> 
        </div>
        <div class="block img8Block">  
            <img src="img/08PackagingArtifactReplica.png" alt="The front of a branded box packaging for a 'City Artifact Replica'. A clean, high-tech package design with futuristic text and a realistic visualization of a small, intricate glowing crystal device. Branding like "SYNTHETIC CITY ARTEFACTS". The entire scene is soft-lit for product display.">
        </div>
        <div class="block img9Block"> 
            <img src="img/09PosterSynthoHub.png" alt="A large, highly-detailed horizontal poster artwork. A panoramic view of a massive 'Syntho-Hub' interior, a cavernous space filled with light, artificial intelligence cores, and human interaction points. The art style is polished and utopian. Bright and vibrant.">
        </div>
        <div class="block img10Block">
            <img src="img/10AvatarInvestor.png" alt="A close-up, high-detail portrait shot of a specific fictional "Investor" persona. The face of a woman with a confident expression, short white hair, and unique, subtle facial bioluminescent tattoos. Dressed in a tailored, textured silver-grey suit. Clean lighting against a soft-focus background of a corporate tower.">  
        </div>
    </main>
    </main>
</body>
</html>
